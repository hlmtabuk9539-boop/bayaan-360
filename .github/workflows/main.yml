name: Ultimate Android APK Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

      - name: Build Web Project
        run: |
          npm run build -- --skipLibCheck || npx vite build --emptyOutDir || echo "Web build finished"
          # Create build directory safely if missing
          mkdir -p dist
          if [ ! -f dist/index.html ] && [ -d www ]; then cp -r www/* dist/; fi
          if [ ! -f dist/index.html ] && [ -d build ]; then cp -r build/* dist/; fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create and Sync Android Platform
        run: |
          npx cap init "Bayaan App" "com.bayaan360.app" --web-dir=dist --force || true
          rm -rf android
          npx cap add android
          npx cap sync

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bayaan-Attendance-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
