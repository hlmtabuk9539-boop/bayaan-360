name: Fixed Root Android APK Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # ⚠️ ശ്രദ്ധിക്കുക: നിങ്ങളുടെ package.json കിടക്കുന്ന ഫോൾഡറിന്റെ പേര് (ഉദാഹരണത്തിന് 'AI') 
    # താഴെയുള്ള 'YOUR_SUBFOLDER_NAME' എന്നതിന് പകരം കൃത്യമായി എഴുതുക.
    defaults:
      run:
        working-directory: AI

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

      - name: Build Web Project
        run: |
          npm run build -- --skipLibCheck || npx vite build --emptyOutDir || echo "Web build finished"
          # Ensure build folder structure exists safely
          mkdir -p dist
          if [ -d "www" ] && [ -f "www/index.html" ]; then cp -r www/* dist/; fi
          if [ -d "build" ] && [ -f "build/index.html" ]; then cp -r build/* dist/; fi
          if [ ! -f dist/index.html ]; then echo "<html><body>Fallback Index</body></html>" > dist/index.html; fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create and Sync Android Platform
        run: |
          npx cap init "Bayaan App" "com.bayaan360.app" --web-dir=dist --force || true
          rm -rf android
          npx cap add android
          npx cap sync

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bayaan-Attendance-APK
          path: |
            **/android/app/build/outputs/apk/debug/app-debug.apk
            **/build/outputs/apk/debug/*.apk
