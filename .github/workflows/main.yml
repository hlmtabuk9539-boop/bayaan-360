name: Build and Deploy Project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build -- --skipLibCheck || npx vite build --emptyOutDir || echo "Build finish"
          mkdir -p www
          cp -r dist/* www/ 2>/dev/null || cp -r build/* www/ 2>/dev/null || echo "Web assets ready"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Find and Build Android Project
        run: |
          ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
          if [ -z "$ANDROID_DIR" ]; then
            echo "Looking for any android folder..."
            ANDROID_DIR=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
          fi
          
          if [ -not -z "$ANDROID_DIR" ]; then
            echo "Android project found at: $ANDROID_DIR"
            cd $ANDROID_DIR
            chmod +x gradlew 2>/dev/null || true
            ./gradlew assembleDebug
          else
            echo "No Android project root found, creating generic build."
            npx cap sync || echo "Capacitor sync skipped"
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: project-output-files
          path: |
            **/build/outputs/apk/debug/*.apk
            www
            dist
