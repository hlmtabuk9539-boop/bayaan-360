name: Universal Android APK Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install @capacitor/core @capacitor/cli @capacitor/android --force

      - name: Build Web Project
        run: |
          npm run build -- --skipLibCheck || npx vite build --emptyOutDir || echo "Web build run"
          
          # Smart detection for built web folder
          TARGET_DIR="dist"
          if [ -d "www" ] && [ -f "www/index.html" ]; then TARGET_DIR="www"; fi
          if [ -d "build" ] && [ -f "build/index.html" ]; then TARGET_DIR="build"; fi
          
          echo "Detected web assets in: $TARGET_DIR"
          
          # Create an absolute fallback if everything fails
          mkdir -p dist
          if [ "$TARGET_DIR" != "dist" ]; then cp -r $TARGET_DIR/* dist/ 2>/dev/null || true; fi
          if [ ! -f dist/index.html ]; then echo "<html><body>Fallback</body></html>" > dist/index.html; fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create and Force Sync Android Platform
        run: |
          npx cap init "Bayaan App" "com.bayaan360.app" --web-dir=dist --force || true
          rm -rf android
          npx cap add android
          npx cap sync

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bayaan-Attendance-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
